name: first workflow
on:
  repository_dispatch:
    types: [test]
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "feature"
    types: [openes, closed]
jobs:
  first-workflow-job:
    name: first job
    runs-on: ubuntu-latest
    steps:
      - name: before checkout actions
        run: ls
        shell: bash

      - name: checkout step
        uses: actions/checkout@v6

      - name: after checkout actions
        run: ls
        shell: bash